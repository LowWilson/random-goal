<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05030a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Random Goal" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css" />
  <title>Random Goal</title>
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">Random picker</p>
        <h1>Random Goal</h1>
      </div>
      <button id="resetAllBtn" class="ghost small">Reset</button>
    </header>

    <section class="tabs">
      <button id="rouletteTab" class="tab active">Goal</button>
      <button id="orderTab" class="tab">Order</button>
      <button id="memoTab" class="tab">Memo</button>
    </section>

    <section id="rouletteMode" class="panel active-panel">
      <div class="goal-card">
        <button id="minusGoal" class="round">−</button>
        <div>
          <p class="label">Goal count</p>
          <strong id="goalValue">3</strong>
        </div>
        <button id="plusGoal" class="round">＋</button>
      </div>

      <div class="input-row">
        <input id="itemInput" placeholder="ルーレット項目 例：A" maxlength="18" />
        <button id="addItemBtn">追加</button>
      </div>

      <div class="wheel-wrap">
        <div class="pointer">▼</div>
        <div id="wheel" class="wheel"><div class="wheel-center">★</div></div>
      </div>

      <button id="spinBtn" class="primary">Start</button>
      <p id="resultText" class="result">Ready</p>

      <div id="itemsList" class="list"></div>

      <div class="section-title">
        <span>履歴</span><button id="clearHistoryBtn" class="ghost tiny">Clear</button>
      </div>
      <div id="historyList" class="history-list"></div>
    </section>

    <section id="orderMode" class="panel">
      <p class="hint">Order専用の項目。ルーレットとは別管理。</p>
      <div class="input-row">
        <input id="orderInput" placeholder="順番項目 例：A" maxlength="18" />
        <button id="addOrderBtn">追加</button>
      </div>
      <button id="shuffleBtn" class="primary">ランダムに順番を決める</button>
      <div class="section-title"><span>項目</span></div>
      <div id="orderItemsList" class="list"></div>
      <div class="section-title"><span>結果</span><button id="clearOrderResultsBtn" class="ghost tiny">Clear</button></div>
      <div id="orderList" class="list order-list"></div>
    </section>

    <section id="memoMode" class="panel">
      <p class="hint">ちょっとしたメモ用。自動保存。</p>
      <textarea id="memoText" placeholder="MEMO"></textarea>
      <p id="memoStatus" class="memo-status">Saved</p>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
